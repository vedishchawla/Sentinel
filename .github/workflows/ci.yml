name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build

  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -c "from config import Settings; print('Config OK')"
      - run: python -c "from models import Incident, PipelineMessage, ResolutionReport; print('Models OK')"
      - run: python -c "from agent.steps import TicketParser, CodebaseAnalyzer, RootCauseDetector, FixGenerator, TestGenerator, SandboxRunner, PRCreator; print('Steps OK')"
